version: '3.8'

services:
  corti-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corti-streamlit-app
    restart: unless-stopped

    # Environment variables from .env file
    env_file:
      - .env

    # Port mapping
    ports:
      - "8501:8501"

    # Volume mounts for data persistence
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./app:/app/app

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

# Networks (optional)
networks:
  default:
    name: corti-network
